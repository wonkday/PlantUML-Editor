version: "3.8"

services:
  plantuml-editor:
    build:
      context: .
      args:
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    container_name: plantuml-editor
    ports:
      - "8001:8001"
    volumes:
      - editor-data:/app/data
    environment:
      - SHARE_TTL_DAYS=5
      - SHARE_MAX_FILES=100
      - SHARE_MAX_SIZE_MB=20
    restart: unless-stopped

volumes:
  editor-data:
